name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch when a new commit is pushed.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

env:
  # Opt into Node.js 24 for JavaScript actions ahead of the 2026-06-02 default.
  # Silences the Node 20 deprecation warning on actions/checkout, setup-go, upload-artifact.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: build & test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25.x"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Verify go.mod is tidy
        run: |
          go mod download
          go mod verify

      - name: Build
        run: make build

      - name: Vet
        run: go vet ./...

      # Docker is pre-installed on ubuntu-latest runners and the testcontainers
      # library auto-detects it. No separate setup step is needed.
      # `make cover-check` chains `cover` and the threshold check; this avoids
      # duplicating the exclusion regex between Makefile and workflow.
      - name: Run tests and enforce coverage thresholds
        run: make cover-check

      - name: Generate HTML coverage report
        if: always()
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.go-version }}
          path: |
            coverage.out
            coverage.html
          retention-days: 14
