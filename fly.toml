app = "dndnd"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # min=1 keeps a machine warm for the 30s turn-timer poller (spec line 89).
  # Otherwise escalations/timeouts fire late while the machine wakes on
  # incoming HTTP. Stale-state scan still recovers on wake as defense in depth.
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

# Persistent volume for asset storage (maps, tokens, tilesets, narration).
# Create with: fly volumes create dndnd_data --region ord --size 1
# cmd/dndnd/main.go auto-defaults ASSET_DATA_DIR=/data/assets when
# FLY_APP_NAME is set, so no env override is required in production.
[mounts]
  source = "dndnd_data"
  destination = "/data"
